<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Previsualizador de Anuncios - Automático</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --sidebar-bg: rgba(22, 27, 34, 0.85);
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent-color: #58a6ff;
            --border-color: rgba(48, 54, 61, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        .controls-sidebar {
            width: 380px;
            background-color: var(--sidebar-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-color);
            padding: 2.5rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            overflow-y: auto;
            box-shadow: 4px 0 25px rgba(0, 0, 0, 0.3);
            z-index: 10;
        }

        .sidebar-header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #58a6ff, #a371f7, #f778ba);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .sidebar-header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .upload-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            background: linear-gradient(135deg, #58a6ff 0%, #3182ce 100%);
            color: #fff;
            padding: 1.1rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 4px 15px rgba(88, 166, 255, 0.25);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .upload-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(88, 166, 255, 0.4);
            filter: brightness(1.1);
        }

        .upload-btn:active {
            transform: translateY(-1px);
        }

        .preview-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1f242c 0%, #0d1117 100%);
            position: relative;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at center, rgba(31, 36, 44, 1) 0%, rgba(13, 17, 23, 1) 100%),
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
        }

        .preview-container {
            position: relative;
            height: 90vh; 
            aspect-ratio: 1059 / 2281; 
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            border-radius: 35px;
        }

        .mockup-image {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: contain;
            z-index: 2;
            pointer-events: none;
        }

        /* Transparente: top 205px, left 60px, ancho 952px (1012-60), alto 1722px (1927-205) en 1059x2281 */
        .media-layer {
            position: absolute;
            top: calc((205 / 2281) * 100%); 
            left: calc((60 / 1059) * 100%);
            width: calc((952 / 1059) * 100%);
            height: calc((1722 / 2281) * 100%);
            z-index: 1; /* Detrás del mockup */
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000;
            overflow: hidden;
            border-radius: 4px;
        }

        .media-layer img, .media-layer video {
            width: 100%;
            height: 100%;
            object-fit: contain; 
        }

        .media-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.3;
        }

        /* =========================================
           RESPONSIVO (Móviles y Tablets)
           ========================================= */
        @media (max-width: 850px) {
            .app-container {
                flex-direction: column;
                height: auto;
                min-height: 100vh;
                overflow-y: auto;
            }

            .controls-sidebar {
                width: 100%;
                height: auto;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                padding: 1.5rem;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
                z-index: 10;
            }

            .sidebar-header h1 {
                font-size: 1.5rem;
            }

            .preview-area {
                flex: 1;
                padding: 1.5rem 1rem;
                min-height: 50vh;
            }

            .preview-container {
                width: 100%;
                max-width: 350px;
                height: auto;
                aspect-ratio: 1059 / 2281;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar for Controls -->
        <aside class="controls-sidebar">
            <div class="sidebar-header">
                <h1>AdPreview</h1>
                <p><strong>Modo Automático:</strong> La creatividad se ajusta sola al espacio interno.</p>
            </div>

            <div class="control-group">
                <label for="media-upload" class="upload-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    Cargar Creatividad (Imagen/Video)
                </label>
                <input type="file" id="media-upload" accept="image/*,video/*" hidden>
            </div>
            
            <div class="sidebar-footer" id="info-panel" style="opacity: 0.5; transition: opacity 0.3s;">
            </div>
        </aside>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const mediaUpload = document.getElementById('media-upload');
            const mediaLayer = document.getElementById('media-layer');
            const infoPanel = document.getElementById('info-panel');

            // File Upload Handling
            mediaUpload.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const fileURL = URL.createObjectURL(file);
                
                // Remove placeholder and old media
                mediaLayer.innerHTML = '';

                let currentMediaElement;
                if (file.type.startsWith('video/')) {
                    currentMediaElement = document.createElement('video');
                    currentMediaElement.src = fileURL;
                    currentMediaElement.autoplay = true;
                    currentMediaElement.loop = true;
                    currentMediaElement.muted = true;
                    currentMediaElement.playsInline = true;
                } else {
                    currentMediaElement = document.createElement('img');
                    currentMediaElement.src = fileURL;
                }
                
                infoPanel.style.opacity = '1';

                mediaLayer.appendChild(currentMediaElement);
            });
        });
    </script>
